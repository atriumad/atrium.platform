<!-- @dsCard group="Textures" viewport="700x230" subtitle="Atmospheric field in use — eyebrow, serif headline, grain over phot+color" name="Texture in use" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--font-sans)}
  .panel{position:relative;height:230px;background-color:var(--teal-800);background-image:var(--surface-atmos);background-size:cover;background-position:center;padding:30px 34px;display:flex;flex-direction:column;justify-content:center;overflow:hidden}
  .panel::after{content:"";position:absolute;inset:0;background-image:var(--surface-grain);background-size:320px auto;opacity:.12;mix-blend-mode:overlay;pointer-events:none}
  .eb{position:relative;z-index:2;font-size:12px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--mint-300)}
  h2{position:relative;z-index:2;margin:12px 0 0;font-family:var(--font-serif);font-weight:400;font-size:46px;line-height:1.02;color:var(--cloud-300)}
  h2 em{font-style:italic;color:var(--amber-400)}
  .meta{position:relative;z-index:2;margin-top:14px;font-size:12px;color:#7fb3ab;letter-spacing:.04em}
</style></head><body>
  <div class="panel">
    <div class="eb">Kansas City · Hospitality Studio</div>
    <h2>Warmth and depth, <em>without a single gradient hack.</em></h2>
    <div class="meta">.atr-bg-atmos + .atr-grain-overlay</div>
  </div>
</body></html>
