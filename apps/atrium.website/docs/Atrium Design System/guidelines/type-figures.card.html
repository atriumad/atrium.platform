<!-- @dsCard group="Type" viewport="700x190" subtitle="Big figures — serif italic & grotesk, for stats & proof" name="Treatment · Stat figures" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--cloud-100);padding:24px;display:flex;gap:28px;align-items:flex-end}
  .fig{display:flex;flex-direction:column;gap:6px}
  .serif{font-family:var(--font-serif);font-style:italic;font-size:84px;line-height:0.82;color:var(--teal-800)}
  .serif .am{color:var(--amber-500)}
  .grotesk{font-weight:800;font-size:84px;line-height:0.82;letter-spacing:-0.04em;color:var(--teal-800)}
  .grotesk .am{color:var(--amber-500)}
  .lab{font-size:12px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--text-muted)}
  .meta{font-family:var(--font-sans);font-size:12px;color:var(--text-muted);align-self:flex-start}
</style></head><body>
  <div class="fig"><span class="serif">2.7&times;</span><span class="lab">Serif italic</span></div>
  <div class="fig"><span class="grotesk">84<span class="am">%</span></span><span class="lab">Grotesk 800</span></div>
  <div class="fig"><span class="grotesk" style="display:inline-flex;align-items:baseline;gap:10px">#1 <span style="font-family:var(--font-serif);font-style:italic;font-weight:400;font-size:30px;line-height:1;color:var(--teal-700);white-space:nowrap">Found first.</span></span><span class="lab">Mixed</span></div>
</body></html>
