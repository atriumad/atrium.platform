<!-- @dsCard group="Colors" viewport="700x150" subtitle="Deep teal — dark anchor, surfaces & ink" name="Teal Scale" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--cloud-200)}
  .row{display:flex;gap:0;padding:20px}
  .sw{flex:1;height:108px;display:flex;align-items:flex-end;padding:10px;box-sizing:border-box}
  .sw:first-child{border-radius:var(--radius-md) 0 0 var(--radius-md)}
  .sw:last-child{border-radius:0 var(--radius-md) var(--radius-md) 0}
  .t{font-size:11px;font-weight:600;letter-spacing:.02em}
  .t span{display:block;opacity:.7;font-weight:500}
</style></head><body>
  <div class="row">
    <div class="sw" style="background:#042024;color:#B5F2DB"><div class="t">900<span>#042024</span></div></div>
    <div class="sw" style="background:#072F34;color:#B5F2DB"><div class="t">800<span>#072F34</span></div></div>
    <div class="sw" style="background:#0E3A40;color:#B5F2DB"><div class="t">700<span>#0E3A40</span></div></div>
    <div class="sw" style="background:#2C6168;color:#E4EEF0"><div class="t">500<span>#2C6168</span></div></div>
    <div class="sw" style="background:#6FA39F;color:#042024"><div class="t">300<span>#6FA39F</span></div></div>
  </div>
</body></html>
