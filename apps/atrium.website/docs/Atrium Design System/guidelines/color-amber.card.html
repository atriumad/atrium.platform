<!-- @dsCard group="Colors" viewport="700x150" subtitle="Amber — campaign fields & the highlighter swipe" name="Warm Accent" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--cloud-200)}
  .row{display:flex;padding:20px}
  .sw{flex:1;height:108px;display:flex;align-items:flex-end;padding:10px;box-sizing:border-box;color:#072F34}
  .sw:first-child{border-radius:var(--radius-md) 0 0 var(--radius-md)}
  .sw:last-child{border-radius:0 var(--radius-md) var(--radius-md) 0}
  .t{font-size:11px;font-weight:700}
  .t span{display:block;opacity:.6;font-weight:500}
</style></head><body>
  <div class="row">
    <div class="sw" style="background:#E0911A"><div class="t">600<span>#E0911A</span></div></div>
    <div class="sw" style="background:#F7A823"><div class="t">500<span>#F7A823</span></div></div>
    <div class="sw" style="background:#FFC21F"><div class="t">400<span>#FFC21F</span></div></div>
    <div class="sw" style="background:#FFE6A8"><div class="t">200<span>#FFE6A8</span></div></div>
  </div>
</body></html>
