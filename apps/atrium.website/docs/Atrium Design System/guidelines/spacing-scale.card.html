<!-- @dsCard group="Spacing" viewport="700x200" subtitle="8px base grid — the spacing ramp" name="Spacing Scale" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--cloud-100);padding:22px}
  .r{display:flex;align-items:center;gap:14px;margin-bottom:9px}
  .bar{height:18px;background:#B5F2DB;border-radius:3px}
  .lbl{font-size:12px;color:var(--text-muted);width:120px;font-variant-numeric:tabular-nums}
  .lbl b{color:var(--text-strong);font-weight:700}
</style></head><body>
  <div class="r"><span class="lbl"><b>2</b> · 8px</span><div class="bar" style="width:8px"></div></div>
  <div class="r"><span class="lbl"><b>4</b> · 16px</span><div class="bar" style="width:16px"></div></div>
  <div class="r"><span class="lbl"><b>5</b> · 24px</span><div class="bar" style="width:24px"></div></div>
  <div class="r"><span class="lbl"><b>6</b> · 32px</span><div class="bar" style="width:32px"></div></div>
  <div class="r"><span class="lbl"><b>8</b> · 48px</span><div class="bar" style="width:48px"></div></div>
  <div class="r"><span class="lbl"><b>10</b> · 64px</span><div class="bar" style="width:64px"></div></div>
  <div class="r"><span class="lbl"><b>12</b> · 80px</span><div class="bar" style="width:80px"></div></div>
</body></html>
