<!-- @dsCard group="Spacing" viewport="700x180" subtitle="Radii — pill chips, soft cards, hero panels" name="Radii" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--cloud-200);padding:22px}
  .row{display:flex;gap:16px;align-items:flex-end}
  .it{text-align:center}
  .box{width:96px;height:96px;background:#072F34;border:none}
  .nm{font-size:12px;color:var(--text-strong);font-weight:700;margin-top:8px}
  .vl{font-size:11px;color:var(--text-muted)}
  .pill{width:120px;height:46px;border-radius:999px;display:flex;align-items:center;justify-content:center;color:#072F34;font-weight:600;border:1.5px solid #072F34;background:transparent}
</style></head><body>
  <div class="row">
    <div class="it"><div class="box" style="border-radius:4px"></div><div class="nm">xs</div><div class="vl">4px</div></div>
    <div class="it"><div class="box" style="border-radius:14px"></div><div class="nm">md · card</div><div class="vl">14px</div></div>
    <div class="it"><div class="box" style="border-radius:22px"></div><div class="nm">lg · panel</div><div class="vl">22px</div></div>
    <div class="it"><div class="pill">Photography</div><div class="nm">pill · chip</div><div class="vl">999px</div></div>
  </div>
</body></html>
