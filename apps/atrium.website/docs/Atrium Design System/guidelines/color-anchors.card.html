<!-- @dsCard group="Colors" viewport="700x200" subtitle="The four identity anchors — sampled from the artwork" name="Brand Anchors" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--cloud-200)}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding:20px}
  .sw{border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--cloud-400)}
  .chip{height:96px}
  .meta{padding:10px 12px;background:var(--cloud-100)}
  .nm{font-weight:700;color:var(--text-strong);font-size:14px}
  .hx{font-size:12px;color:var(--text-muted);letter-spacing:.02em;margin-top:2px;text-transform:uppercase}
</style></head><body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#072F34"></div><div class="meta"><div class="nm">Deep Teal</div><div class="hx">#072F34</div></div></div>
    <div class="sw"><div class="chip" style="background:#B5F2DB"></div><div class="meta"><div class="nm">Mint</div><div class="hx">#B5F2DB</div></div></div>
    <div class="sw"><div class="chip" style="background:#E4EEF0"></div><div class="meta"><div class="nm">Cloud</div><div class="hx">#E4EEF0</div></div></div>
    <div class="sw"><div class="chip" style="background:#F7A823"></div><div class="meta"><div class="nm">Amber</div><div class="hx">#F7A823</div></div></div>
  </div>
</body></html>
