<!-- @dsCard group="Type" viewport="700x230" subtitle="Instrument Serif — editorial serif, used italic for emphasis" name="Serif · Instrument Serif" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-serif);background:var(--cloud-100);color:var(--text-strong);padding:24px}
  .lg{font-size:46px;line-height:1.04;font-weight:400}
  .lg em{font-style:italic;color:var(--text-muted)}
  .nums{display:flex;gap:36px;margin-top:16px}
  .num{font-style:italic;font-size:48px;line-height:1;color:var(--text-strong)}
  .meta{font-family:var(--font-sans);font-size:12px;color:var(--text-muted);margin-top:16px}
</style></head><body>
  <div class="lg">Strategy &amp; data to grow <em>restaurants, hotels, and food brands.</em></div>
  <div class="nums"><span class="num">$44</span><span class="num">70%</span><span class="num">2.7x</span></div>
  <div class="meta">Instrument Serif · roman + italic · italic carries emphasis &amp; stat figures</div>
</body></html>
