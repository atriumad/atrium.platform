<!-- @dsCard group="Posts" viewport="1080x1920" subtitle="9:16 story · photo bleed · grain · repeated word + serif · story chrome" name="Story · Experience Era" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<script src="../assets/social/image-slot.js"></script>
<style>
  *{box-sizing:border-box}html,body{margin:0}
  body{font-family:var(--font-sans)}
  image-slot{display:block}
  .story{width:1080px;height:1920px;position:relative;overflow:hidden;background:var(--teal-800)}
  .bg{position:absolute;inset:0;width:100%;height:100%}
  .tint{position:absolute;inset:0;background:linear-gradient(180deg,rgba(7,47,52,.55) 0%,rgba(7,47,52,.05) 30%,rgba(7,47,52,.62) 100%);z-index:2}
  .grain{position:absolute;inset:0;background-image:var(--surface-grain);background-size:560px auto;opacity:.18;mix-blend-mode:soft-light;pointer-events:none;z-index:3}
  .top{position:absolute;top:40px;left:40px;right:40px;z-index:4}
  .bars{display:flex;gap:8px;margin-bottom:22px}
  .bars span{flex:1;height:5px;border-radius:3px;background:rgba(228,238,240,.4)}
  .bars span.on{background:var(--cloud-300)}
  .who{display:flex;align-items:center;gap:14px;color:var(--cloud-300);font-size:24px}
  .av{width:48px;height:48px;border-radius:50%;background:var(--amber-500);color:var(--teal-800);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:24px}
  .vert{position:absolute;left:-18px;top:300px;z-index:4;font-weight:800;font-size:128px;letter-spacing:-.03em;line-height:.9;color:rgba(255,194,31,.92);transform:rotate(-90deg);transform-origin:left top;white-space:nowrap}
  .eb{position:absolute;left:48px;bottom:340px;z-index:4;font-size:22px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--mint-300)}
  .lead{position:absolute;left:48px;right:48px;bottom:210px;z-index:4;font-family:var(--font-serif);font-style:italic;font-size:74px;line-height:1.06;color:var(--cloud-100)}
  .reply{position:absolute;left:40px;right:40px;bottom:48px;z-index:4;display:flex;align-items:center;gap:12px;border:1.5px solid rgba(228,238,240,.55);border-radius:999px;padding:22px 30px;color:rgba(228,238,240,.8);font-size:24px}
</style></head><body>
  <div class="story">
    <image-slot id="story-era-bg" class="bg" shape="rect" placeholder="Drop a dinner / room photo"></image-slot>
    <div class="tint"></div>
    <div class="grain"></div>
    <div class="top">
      <div class="bars"><span class="on"></span><span></span><span></span></div>
      <div class="who"><span class="av">α</span><b style="font-weight:600">atrium</b><span style="opacity:.7">· 2h</span><span style="margin-left:auto;opacity:.8">✕</span></div>
    </div>
    <div class="vert">EXPERIENCE</div>
    <div class="eb">The Experience Era</div>
    <div class="lead">Together is more fun.</div>
    <div class="reply">Send message<span style="margin-left:auto">➤</span></div>
  </div>
</body></html>
