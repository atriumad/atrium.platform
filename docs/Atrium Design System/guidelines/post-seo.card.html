<!-- @dsCard group="Posts" viewport="1080x1350" subtitle="4:5 feed · amber aurora + grain · grotesk + serif · service pills · photo space" name="Feed · Get found first" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<script src="../assets/social/image-slot.js"></script>
<style>
  *{box-sizing:border-box}html,body{margin:0}
  body{font-family:var(--font-sans);color:var(--text-strong)}
  image-slot{display:block}
  .post{width:1080px;height:1350px;position:relative;overflow:hidden;background-color:var(--mint-200);background-image:var(--grad-aurora-warm);padding:84px;display:flex;flex-direction:column}
  .grain{position:absolute;inset:0;background-image:var(--surface-grain);background-size:480px auto;opacity:.16;mix-blend-mode:soft-light;pointer-events:none;z-index:1}
  .row{position:relative;z-index:2;display:flex;justify-content:space-between;align-items:center}
  .mono{font-family:var(--font-display);color:var(--teal-800)}
  .eb{font-size:18px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--text-muted)}
  h1{position:relative;z-index:2;margin:40px 0 0;font-weight:700;font-size:104px;letter-spacing:-.03em;line-height:.92;color:var(--teal-800)}
  h1 .ser{font-family:var(--font-serif);font-style:italic;font-weight:400}
  .pills{position:relative;z-index:2;display:flex;gap:13px;flex-wrap:wrap;margin-top:34px}
  .pill{display:inline-flex;align-items:center;border-radius:999px;padding:13px 24px;font-size:21px;font-weight:600}
  .p-out{background:var(--cloud-100);border:1.5px solid var(--cloud-400);color:var(--teal-800)}
  .p-ink{background:var(--teal-800);color:var(--cloud-300)}
  .p-mint{background:var(--mint-400);color:var(--teal-800)}
  .photo{position:relative;z-index:2;margin-top:auto;border-radius:24px;overflow:hidden;height:380px;background:var(--teal-700);box-shadow:var(--shadow-soft)}
  .search{position:absolute;left:26px;top:26px;z-index:3;display:flex;align-items:center;gap:11px;background:var(--cloud-100);border-radius:999px;padding:13px 24px;font-size:21px;color:var(--text-muted);box-shadow:var(--shadow-soft)}
  .cap{position:absolute;left:26px;bottom:22px;z-index:3;color:var(--cloud-100);font-size:21px;font-weight:500;text-shadow:0 1px 8px rgba(7,47,52,.6)}
</style></head><body>
  <div class="post">
    <div class="grain"></div>
    <div class="row">
      <span class="eb">SEO that compounds</span>
      <span class="mono" style="font-size:50px">α</span>
    </div>
    <h1>Get found<br><span class="ser">first.</span></h1>
    <div class="pills">
      <span class="pill p-mint">rank #1</span>
      <span class="pill p-out">local SEO</span>
      <span class="pill p-ink">high-intent</span>
    </div>
    <div class="photo">
      <image-slot id="feed-seo-photo" style="position:absolute;inset:0;width:100%;height:100%" shape="rect" placeholder="Drop a signature dish photo"></image-slot>
      <div class="search">⌕&nbsp; best near me</div>
      <span class="cap">When they search, you're the answer.</span>
    </div>
  </div>
</body></html>
