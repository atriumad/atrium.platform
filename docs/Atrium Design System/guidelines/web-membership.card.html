<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<script src="../assets/social/image-slot.js"></script>
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--font-sans);background:var(--grad-aurora);color:var(--teal-800);padding:48px 56px;position:relative}
  .grain{position:fixed;inset:0;background-image:var(--surface-grain);background-size:520px auto;opacity:.07;mix-blend-mode:overlay;pointer-events:none;z-index:0}
  h3{font-size:30px;font-weight:700;letter-spacing:-.01em;color:var(--teal-800);text-align:center;margin:0 0 34px;position:relative;z-index:1}
  .cols{display:grid;grid-template-columns:1fr 1.06fr;gap:26px;align-items:start;position:relative;z-index:1}
  .stack{display:flex;flex-direction:column;gap:20px}
  .illus{height:236px;border-radius:var(--radius-bento);background:var(--grad-aurora-mint);position:relative;overflow:hidden;box-shadow:var(--shadow-soft);border:1px solid rgba(255,255,255,.55)}
  .illus::after{content:"";position:absolute;inset:0;opacity:.42;
    -webkit-mask:url(../assets/logos/atrium-mark.svg) center/48% no-repeat;mask:url(../assets/logos/atrium-mark.svg) center/48% no-repeat;background:var(--teal-700)}
  .photo{height:210px;border-radius:var(--radius-bento);overflow:hidden;background:var(--teal-700);box-shadow:var(--shadow-soft);border:1px solid rgba(255,255,255,.55)}
  .panel{background:var(--cloud-100);border-radius:var(--radius-bento);padding:18px;display:flex;flex-direction:column;gap:12px;box-shadow:var(--shadow-float);border:1px solid rgba(255,255,255,.6)}
  .opt{background:var(--cloud-200);border-radius:14px;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;font-size:16px;font-weight:600;border:1.5px solid transparent}
  .opt.sel{border-color:transparent;background:var(--mint-300)}
  .price{display:flex;align-items:center;gap:12px;color:var(--text-muted);font-weight:600}
  .check{width:22px;height:22px;border-radius:999px;background:var(--teal-800);color:var(--mint-400);display:flex;align-items:center;justify-content:center;font-size:13px}
  .radio{width:21px;height:21px;border-radius:999px;border:1.6px solid var(--cloud-400)}
  .group{background:var(--cloud-200);border-radius:14px;overflow:hidden}
  .group .head{padding:14px 18px 4px}
  .group .head .ttl{font-size:16px;font-weight:600}
  .group .head .sub{font-size:13px;color:var(--text-muted)}
  .row{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;font-size:16px;font-weight:600}
  .row + .row{border-top:1px solid var(--cloud-300)}
  .save{background:var(--amber-500);color:var(--teal-800);font-size:11px;font-weight:700;letter-spacing:.04em;border-radius:999px;padding:5px 11px}
  .submeta{font-size:13px;color:var(--text-muted);font-weight:500}
  .cta{margin-top:6px;background:var(--teal-800);color:var(--cloud-300);border:0;border-radius:16px;padding:20px;font-size:18px;font-weight:600;font-family:inherit;cursor:pointer;box-shadow:var(--shadow-soft)}
</style></head><body>
  <div class="grain"></div>
  <h3>Powering 1,000+ restaurants, shops, and retailers across the industry</h3>
  <div class="cols">
    <div class="stack">
      <div class="illus"></div>
      <div class="photo" style="position:relative;padding:0;overflow:hidden"><image-slot id="mem-photo" style="position:absolute;inset:0;width:100%;height:100%" shape="rect" placeholder="Drop brand photography"></image-slot></div>
    </div>
    <div class="stack">
      <div class="panel">
        <div class="opt sel"><span>Vietnamese feast for one</span><span class="price">$107 <span class="check">✓</span></span></div>
        <div class="group">
          <div class="head"><div class="ttl">Optional wine pairing</div><div class="sub">From our somelier</div></div>
          <div class="row"><span>Bottle of red wine</span><span class="price">+ $56 <span class="radio"></span></span></div>
          <div class="row"><span>No, thank you</span><span class="check">✓</span></div>
        </div>
        <div class="opt"><span>Annual membership</span><span class="price"><span class="save">SAVE 10%</span> <span class="radio"></span></span></div>
        <div class="submeta" style="margin:-4px 4px 0">12 orders for $160 / month</div>
      </div>
      <button class="cta">Solutions for Restaurants</button>
    </div>
  </div>
</body></html>
