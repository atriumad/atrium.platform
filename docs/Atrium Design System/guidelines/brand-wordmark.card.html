<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--cloud-200)}
  .col{display:flex;flex-direction:column;gap:14px;padding:20px}
  .tile{height:88px;border-radius:var(--radius-md);display:flex;align-items:center;padding-left:40px;border:1px solid var(--cloud-400)}
  .wm{width:230px;height:64px;-webkit-mask:url(../assets/logos/atrium-wordmark.svg) left center/contain no-repeat;mask:url(../assets/logos/atrium-wordmark.svg) left center/contain no-repeat}
</style></head><body>
  <div class="col">
    <div class="tile" style="background:#072F34"><div class="wm" style="background:#B5F2DB"></div></div>
    <div class="tile" style="background:#E4EEF0"><div class="wm" style="background:#072F34"></div></div>
  </div>
</body></html>
