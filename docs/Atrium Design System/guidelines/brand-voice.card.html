<!-- @dsCard group="Brand" viewport="700x230" subtitle="Marker highlight + mixed type voices in one line" name="Voice & Marker" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:#F7A823;color:#072F34;padding:28px;display:flex;flex-direction:column;justify-content:center;gap:16px}
  .line{font-size:34px;font-weight:800;line-height:1.05;letter-spacing:-.01em}
  .line .scr{font-family:var(--font-script);font-weight:400}
  .line .ser{font-family:var(--font-serif);font-weight:600}
  .u{text-decoration:underline;text-decoration-thickness:2px;text-underline-offset:3px}
  .mark2{background:linear-gradient(#FFC21F,#FFC21F) no-repeat;background-size:100% 62%;background-position:0 78%;padding:0 .12em;box-decoration-break:clone;-webkit-box-decoration-break:clone}
</style></head><body>
  <div class="line">We're <span class="scr u">humans.</span> <span class="mark2">Marketing</span> for <span class="ser">better Business.</span></div>
</body></html>
