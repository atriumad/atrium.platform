<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--teal-800);padding:30px 28px;display:flex;align-items:center;min-height:120px}
  .line{font-family:var(--font-sans);font-weight:800;font-size:46px;letter-spacing:-0.02em;line-height:1.05;color:var(--cloud-300)}
  .ital{font-family:var(--font-serif);font-style:italic;font-weight:400;color:var(--amber-400)}
  .script{font-family:var(--font-script);font-weight:400;color:var(--mint-400);font-size:0.92em}
  .meta{font-family:var(--font-sans);font-size:12px;color:#6FA39F;margin-top:14px}
</style></head><body>
  <div>
    <div class="line">Content that stops the <span class="script">scroll</span>, built with <span class="ital">craft.</span></div>
    <div class="meta">Inter Tight 800 · Instrument Serif italic · Nothing You Could Do — the three voices in one headline</div>
  </div>
</body></html>
