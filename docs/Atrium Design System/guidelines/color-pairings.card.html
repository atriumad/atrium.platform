<!-- @dsCard group="Colors" viewport="700x200" subtitle="Approved two-tone pairings + contrast" name="Pairings" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--cloud-200)}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding:20px}
  .pair{border-radius:var(--radius-md);height:128px;display:flex;flex-direction:column;justify-content:center;padding:18px;box-sizing:border-box;border:1px solid var(--cloud-400)}
  .big{font-size:22px;font-weight:700;line-height:1.1}
  .sm{font-size:12px;margin-top:6px;opacity:.85}
</style></head><body>
  <div class="grid">
    <div class="pair" style="background:#072F34"><div class="big" style="color:#B5F2DB">Aa</div><div class="sm" style="color:#E4EEF0">Mint on Teal</div></div>
    <div class="pair" style="background:#B5F2DB"><div class="big" style="color:#072F34">Aa</div><div class="sm" style="color:#0E3A40">Teal on Mint</div></div>
    <div class="pair" style="background:#F7A823"><div class="big" style="color:#072F34">Aa</div><div class="sm" style="color:#0E3A40">Teal on Amber</div></div>
    <div class="pair" style="background:#F4F8F8"><div class="big" style="color:#072F34">Aa</div><div class="sm" style="color:#2C6168">Teal on Cloud</div></div>
  </div>
</body></html>
