<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--cloud-200)}
  .row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;padding:20px}
  .tile{height:148px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;border:1px solid var(--cloud-400)}
  .mark{width:84px;height:84px;-webkit-mask:url(../assets/logos/atrium-mark.svg) center/contain no-repeat;mask:url(../assets/logos/atrium-mark.svg) center/contain no-repeat}
</style></head><body>
  <div class="row">
    <div class="tile" style="background:#072F34"><div class="mark" style="background:#B5F2DB"></div></div>
    <div class="tile" style="background:#B5F2DB"><div class="mark" style="background:#072F34"></div></div>
    <div class="tile" style="background:#F7A823"><div class="mark" style="background:#072F34"></div></div>
  </div>
</body></html>
