<!-- @dsCard group="Posts" viewport="1080x1350" subtitle="4:5 feed · full-bleed photo · grain · float stat card · serif marker figure" name="Feed · The receipts" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<script src="../assets/social/image-slot.js"></script>
<style>
  *{box-sizing:border-box}html,body{margin:0}
  body{font-family:var(--font-sans);color:var(--text-strong)}
  image-slot{display:block}
  .post{width:1080px;height:1350px;position:relative;overflow:hidden;background:var(--teal-800)}
  .bg{position:absolute;inset:0;width:100%;height:100%}
  .tint{position:absolute;inset:0;background:linear-gradient(180deg,rgba(7,47,52,.25) 0%,rgba(7,47,52,.05) 36%,rgba(7,47,52,.74) 100%);z-index:2}
  .grain{position:absolute;inset:0;background-image:var(--surface-grain);background-size:480px auto;opacity:.18;mix-blend-mode:soft-light;pointer-events:none;z-index:3}
  .pad{position:absolute;inset:0;z-index:4;padding:84px;display:flex;flex-direction:column;justify-content:space-between}
  .row{display:flex;justify-content:space-between;align-items:center}
  .mono{font-family:var(--font-display)}
  .eb{font-size:18px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--mint-300)}
  .pill{display:inline-flex;align-items:center;border-radius:999px;padding:11px 22px;font-size:19px;font-weight:600;background:var(--amber-500);color:var(--teal-800)}
  .float{background:var(--cloud-100);border-radius:28px;box-shadow:var(--shadow-float);padding:44px 50px}
  .stat{font-family:var(--font-serif);font-style:italic;font-size:152px;line-height:.8;color:var(--teal-800)}
  .mk{background-image:linear-gradient(var(--amber-400),var(--amber-400));background-repeat:no-repeat;background-size:100% 46%;background-position:0 70%;padding:0 .04em}
  .lede{font-size:24px;line-height:1.4;color:var(--text-body);max-width:22ch}
</style></head><body>
  <div class="post">
    <image-slot id="feed-receipts-bg" class="bg" shape="rect" placeholder="Drop a hero food photo"></image-slot>
    <div class="tint"></div>
    <div class="grain"></div>
    <div class="pad">
      <div class="row">
        <span class="eb">The receipts</span>
        <span class="pill">Q1 2026</span>
      </div>
      <div class="float">
        <div class="stat"><span class="mk">2.7×</span></div>
        <div class="row" style="margin-top:28px;align-items:flex-end">
          <div class="lede">more covers booked for partner restaurants in their first 90 days.</div>
          <span class="mono" style="font-size:36px;color:var(--teal-800)">atrium</span>
        </div>
      </div>
    </div>
  </div>
</body></html>
