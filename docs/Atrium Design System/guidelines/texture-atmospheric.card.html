<!-- @dsCard group="Textures" viewport="700x190" subtitle="Atmospheric backgrounds — forest glow & charcoal sage, for hero / section fields" name="Atmospheric gradients" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--font-sans);background:var(--cloud-100);padding:20px;display:flex;gap:18px}
  .sw{flex:1;height:150px;border-radius:14px;overflow:hidden;position:relative;display:flex;align-items:flex-end;box-shadow:inset 0 0 0 1px rgba(7,47,52,.08)}
  .sw .t{position:relative;z-index:2;padding:14px 16px}
  .sw .t b{display:block;font-size:14px;font-weight:600;color:#fff;letter-spacing:.01em}
  .sw .t span{font-size:11px;color:rgba(255,255,255,.7);letter-spacing:.04em}
  .a{background-color:var(--teal-800);background-image:var(--surface-atmos);background-size:cover;background-position:center}
  .b{background-color:#0a1512;background-image:var(--surface-atmos-deep);background-size:cover;background-position:center}
</style></head><body>
  <div class="sw a"><div class="t"><b>Forest glow</b><span>--surface-atmos</span></div></div>
  <div class="sw b"><div class="t"><b>Charcoal sage</b><span>--surface-atmos-deep</span></div></div>
</body></html>
