<!-- @dsCard group="Brand" viewport="700x220" subtitle="Iridescent mesh washes — balanced / warm / cool / deep, built from brand hues + pale optical halos" name="Aurora gradients" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--font-sans);background:var(--cloud-200);padding:22px;color:var(--teal-800)}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  .sw{border-radius:var(--radius-bento);overflow:hidden;box-shadow:var(--shadow-soft);border:1px solid rgba(255,255,255,.55)}
  .field{height:122px}
  .lbl{padding:11px 13px;background:var(--cloud-100);font-size:12px}
  .lbl b{font-family:var(--font-display);font-weight:400}
  .lbl span{display:block;color:var(--text-muted);font-size:11px;margin-top:2px}
</style></head><body>
  <div class="grid">
    <div class="sw"><div class="field atr-aurora"></div><div class="lbl"><b>--grad-aurora</b><span>balanced default</span></div></div>
    <div class="sw"><div class="field atr-aurora--warm"></div><div class="lbl"><b>--grad-aurora-warm</b><span>amber campaign</span></div></div>
    <div class="sw"><div class="field atr-aurora--cool"></div><div class="lbl"><b>--grad-aurora-cool</b><span>mint · editorial</span></div></div>
    <div class="sw"><div class="field atr-aurora--deep"></div><div class="lbl"><b>--grad-aurora-deep</b><span>dark tile · light type</span></div></div>
  </div>
</body></html>
